<svg width="900" height="360" viewBox="0 0 900 360" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>3 Levels of Spec-Driven Development</title>
  <desc>A comparison diagram showing three SDD adoption levels — Spec-First, Spec-Anchored, and Spec-as-Source — with key characteristics for each.</desc>

  <defs>
    <marker id="level-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M2 2L8 5L2 8" fill="#94a3b8" stroke="none"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="360" fill="#fafaf9" rx="12"/>

  <!-- Maturity arrow across the bottom -->
  <line x1="60" y1="330" x2="840" y2="330" stroke="#cbd5e1" stroke-width="1.5" marker-end="url(#level-arrow)"/>
  <text x="450" y="352" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" font-weight="500" fill="#94a3b8">Increasing maturity and automation</text>

  <!-- ==================== Spec-First ==================== -->
  <g>
    <rect x="30" y="20" width="260" height="290" rx="12" fill="#ffffff" stroke="#a78bfa" stroke-width="2"/>

    <!-- Header -->
    <rect x="30" y="20" width="260" height="48" rx="12" fill="#ede9fe"/>
    <rect x="30" y="44" width="260" height="24" fill="#ede9fe"/>
    <text x="160" y="51" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#5b21b6">Spec-First</text>

    <!-- Characteristics -->
    <text x="50" y="92" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="600" fill="#334155">Humans edit</text>
    <text x="50" y="108" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#64748b">Spec + Code</text>

    <line x1="50" y1="120" x2="270" y2="120" stroke="#f1f5f9" stroke-width="1"/>

    <text x="50" y="140" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="600" fill="#334155">Spec maintained?</text>
    <text x="50" y="156" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#64748b">Optional — may be discarded</text>

    <line x1="50" y1="168" x2="270" y2="168" stroke="#f1f5f9" stroke-width="1"/>

    <text x="50" y="188" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="600" fill="#334155">Testing requirement</text>
    <text x="50" y="204" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#64748b">Standard</text>

    <line x1="50" y1="216" x2="270" y2="216" stroke="#f1f5f9" stroke-width="1"/>

    <text x="50" y="236" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="600" fill="#334155">Tooling maturity needed</text>
    <text x="50" y="252" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#64748b">Low</text>

    <line x1="50" y1="264" x2="270" y2="264" stroke="#f1f5f9" stroke-width="1"/>

    <text x="50" y="284" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="600" fill="#334155">Best for</text>
    <text x="50" y="300" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#64748b">Prototypes, proof-of-concepts</text>
  </g>

  <!-- Arrow between 1 and 2 -->
  <path d="M298 165 L312 165" stroke="#cbd5e1" stroke-width="1.5" marker-end="url(#level-arrow)"/>

  <!-- ==================== Spec-Anchored ==================== -->
  <g>
    <rect x="320" y="20" width="260" height="290" rx="12" fill="#ffffff" stroke="#3b82f6" stroke-width="2"/>

    <!-- Header -->
    <rect x="320" y="20" width="260" height="48" rx="12" fill="#dbeafe"/>
    <rect x="320" y="44" width="260" height="24" fill="#dbeafe"/>
    <text x="450" y="51" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#1e40af">Spec-Anchored</text>

    <!-- Characteristics -->
    <text x="340" y="92" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="600" fill="#334155">Humans edit</text>
    <text x="340" y="108" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#64748b">Spec + Code (both maintained)</text>

    <line x1="340" y1="120" x2="560" y2="120" stroke="#f1f5f9" stroke-width="1"/>

    <text x="340" y="140" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="600" fill="#334155">Spec maintained?</text>
    <text x="340" y="156" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#64748b">Yes — synchronized with code</text>

    <line x1="340" y1="168" x2="560" y2="168" stroke="#f1f5f9" stroke-width="1"/>

    <text x="340" y="188" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="600" fill="#334155">Testing requirement</text>
    <text x="340" y="204" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#64748b">Spec-aligned tests required</text>

    <line x1="340" y1="216" x2="560" y2="216" stroke="#f1f5f9" stroke-width="1"/>

    <text x="340" y="236" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="600" fill="#334155">Tooling maturity needed</text>
    <text x="340" y="252" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#64748b">Medium</text>

    <line x1="340" y1="264" x2="560" y2="264" stroke="#f1f5f9" stroke-width="1"/>

    <text x="340" y="284" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="600" fill="#334155">Best for</text>
    <text x="340" y="300" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#64748b">Long-lived production systems</text>
  </g>

  <!-- Arrow between 2 and 3 -->
  <path d="M588 165 L602 165" stroke="#cbd5e1" stroke-width="1.5" marker-end="url(#level-arrow)"/>

  <!-- ==================== Spec-as-Source ==================== -->
  <g>
    <rect x="610" y="20" width="260" height="290" rx="12" fill="#ffffff" stroke="#059669" stroke-width="2"/>

    <!-- Header -->
    <rect x="610" y="20" width="260" height="48" rx="12" fill="#d1fae5"/>
    <rect x="610" y="44" width="260" height="24" fill="#d1fae5"/>
    <text x="740" y="51" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#064e3b">Spec-as-Source</text>

    <!-- Characteristics -->
    <text x="630" y="92" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="600" fill="#334155">Humans edit</text>
    <text x="630" y="108" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#64748b">Spec only — code is generated</text>

    <line x1="630" y1="120" x2="850" y2="120" stroke="#f1f5f9" stroke-width="1"/>

    <text x="630" y="140" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="600" fill="#334155">Spec maintained?</text>
    <text x="630" y="156" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#64748b">Yes — it IS the source of truth</text>

    <line x1="630" y1="168" x2="850" y2="168" stroke="#f1f5f9" stroke-width="1"/>

    <text x="630" y="188" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="600" fill="#334155">Testing requirement</text>
    <text x="630" y="204" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#64748b">Full automated suite (unit,</text>
    <text x="630" y="218" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#64748b">integration, e2e)</text>

    <line x1="630" y1="230" x2="850" y2="230" stroke="#f1f5f9" stroke-width="1"/>

    <text x="630" y="250" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="600" fill="#334155">Tooling maturity needed</text>
    <text x="630" y="266" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#64748b">High</text>

    <line x1="630" y1="278" x2="850" y2="278" stroke="#f1f5f9" stroke-width="1"/>

    <text x="630" y="298" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="600" fill="#334155">Best for</text>
    <text x="630" y="314" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#64748b">Mature teams with trusted</text>
    <text x="630" y="328" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#64748b">generation tooling</text>
  </g>

</svg>
