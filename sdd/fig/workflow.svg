<svg width="920" height="480" viewBox="0 0 920 480" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>SDD Workflow — Project Evolution</title>
  <desc>A timeline showing the SDD workflow: Constitution, then repeating cycles of Feature Development (Specification, Planning, Implementation, Validation) and Replanning.</desc>

  <defs>
    <marker id="timeline-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M2 2L8 5L2 8" fill="none" stroke="#64748b" stroke-width="1.5" stroke-linecap="round"/>
    </marker>
    <marker id="flow-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M2 2L8 5L2 8" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-linecap="round"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="920" height="480" fill="#fafaf9" rx="12"/>

  <!-- Title -->
  <text x="460" y="32" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="600" fill="#1e293b">Project Evolution</text>

  <!-- Timeline arrow -->
  <line x1="40" y1="100" x2="890" y2="100" stroke="#64748b" stroke-width="2" marker-end="url(#timeline-arrow)"/>

  <!-- ==================== Constitution ==================== -->
  <g>
    <rect x="30" y="58" width="150" height="34" rx="8" fill="#f0f9ff" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="105" y="80" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#1e40af">Constitution</text>
    <!-- Document icon -->
    <rect x="55" y="104" width="14" height="16" rx="2" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
    <line x1="59" y1="109" x2="65" y2="109" stroke="#3b82f6" stroke-width="1"/>
    <line x1="59" y1="113" x2="65" y2="113" stroke="#3b82f6" stroke-width="1"/>
    <!-- Color squares representing project docs -->
    <rect x="76" y="106" width="10" height="10" rx="2" fill="#f87171"/>
    <rect x="90" y="106" width="10" height="10" rx="2" fill="#60a5fa"/>
    <rect x="104" y="106" width="10" height="10" rx="2" fill="#4ade80"/>
    <rect x="118" y="106" width="10" height="10" rx="2" fill="#a78bfa"/>
  </g>

  <!-- ==================== Feature Phase 1 ==================== -->
  <g>
    <!-- Connector line down from timeline -->
    <line x1="295" y1="100" x2="295" y2="142" stroke="#94a3b8" stroke-width="1.5"/>

    <rect x="210" y="145" width="170" height="310" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>
    <text x="295" y="172" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700" fill="#1e293b">Feature Phase 1</text>

    <!-- Specification -->
    <rect x="226" y="190" width="138" height="38" rx="8" fill="#ede9fe" stroke="#a78bfa" stroke-width="1"/>
    <text x="295" y="214" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="500" fill="#5b21b6">Specification</text>

    <line x1="295" y1="228" x2="295" y2="244" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#flow-arrow)"/>

    <!-- Planning -->
    <rect x="226" y="247" width="138" height="38" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
    <text x="295" y="271" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="500" fill="#1e40af">Planning</text>

    <line x1="295" y1="285" x2="295" y2="301" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#flow-arrow)"/>

    <!-- Implementation -->
    <rect x="226" y="304" width="138" height="38" rx="8" fill="#d1fae5" stroke="#059669" stroke-width="1"/>
    <text x="295" y="328" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="500" fill="#064e3b">Implementation</text>

    <line x1="295" y1="342" x2="295" y2="358" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#flow-arrow)"/>

    <!-- Validation -->
    <rect x="226" y="361" width="138" height="38" rx="8" fill="#fef9c3" stroke="#fbbf24" stroke-width="1"/>
    <text x="295" y="385" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="500" fill="#92400e">Validation</text>
  </g>

  <!-- ==================== Replanning 1 ==================== -->
  <g>
    <rect x="430" y="58" width="140" height="34" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.5"/>
    <text x="500" y="80" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#166534">Replanning</text>

    <!-- Circular refresh icon using two arcs -->
    <g transform="translate(500, 118)">
      <!-- Top arc (clockwise) -->
      <path d="M-8,-6 A10,10 0 0,1 8,-6" fill="none" stroke="#22c55e" stroke-width="1.8" stroke-linecap="round"/>
      <!-- Top arrowhead -->
      <path d="M5,-9 L8,-6 L5,-3" fill="none" stroke="#22c55e" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      <!-- Bottom arc (clockwise) -->
      <path d="M8,6 A10,10 0 0,1 -8,6" fill="none" stroke="#22c55e" stroke-width="1.8" stroke-linecap="round"/>
      <!-- Bottom arrowhead -->
      <path d="M-5,9 L-8,6 L-5,3" fill="none" stroke="#22c55e" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>

  <!-- ==================== Feature Phase 2 ==================== -->
  <g>
    <!-- Connector line down from timeline -->
    <line x1="700" y1="100" x2="700" y2="142" stroke="#94a3b8" stroke-width="1.5"/>

    <rect x="615" y="145" width="170" height="310" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>
    <text x="700" y="172" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700" fill="#1e293b">Feature Phase 2</text>

    <!-- Specification -->
    <rect x="631" y="190" width="138" height="38" rx="8" fill="#ede9fe" stroke="#a78bfa" stroke-width="1"/>
    <text x="700" y="214" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="500" fill="#5b21b6">Specification</text>

    <line x1="700" y1="228" x2="700" y2="244" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#flow-arrow)"/>

    <!-- Planning -->
    <rect x="631" y="247" width="138" height="38" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
    <text x="700" y="271" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="500" fill="#1e40af">Planning</text>

    <line x1="700" y1="285" x2="700" y2="301" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#flow-arrow)"/>

    <!-- Implementation -->
    <rect x="631" y="304" width="138" height="38" rx="8" fill="#d1fae5" stroke="#059669" stroke-width="1"/>
    <text x="700" y="328" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="500" fill="#064e3b">Implementation</text>

    <line x1="700" y1="342" x2="700" y2="358" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#flow-arrow)"/>

    <!-- Validation -->
    <rect x="631" y="361" width="138" height="38" rx="8" fill="#fef9c3" stroke="#fbbf24" stroke-width="1"/>
    <text x="700" y="385" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="500" fill="#92400e">Validation</text>
  </g>

  <!-- ==================== Replanning 2 ==================== -->
  <g>
    <rect x="830" y="58" width="60" height="34" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.5"/>
    <text x="860" y="80" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="10" font-weight="600" fill="#166534">Replan</text>

    <!-- Circular refresh icon -->
    <g transform="translate(860, 116)">
      <path d="M-6,-5 A8,8 0 0,1 6,-5" fill="none" stroke="#22c55e" stroke-width="1.5" stroke-linecap="round"/>
      <path d="M4,-8 L6,-5 L3,-3" fill="none" stroke="#22c55e" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M6,5 A8,8 0 0,1 -6,5" fill="none" stroke="#22c55e" stroke-width="1.5" stroke-linecap="round"/>
      <path d="M-4,8 L-6,5 L-3,3" fill="none" stroke="#22c55e" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>

  <!-- Continuation dots -->
  <circle cx="898" cy="100" r="2" fill="#64748b"/>

</svg>
